<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イマミル</title>

  <style>
    body{
      margin:0;
      font-family: "Yu Gothic", sans-serif;
      background:#0b132b;
      color:white;
      text-align:center;
    }

    header{
      background:#0077b6;
      padding:25px;
      font-size:36px;
      font-weight:bold;
    }

    h2{
      margin-top:50px;
      font-size:28px;
    }

    p{
      font-size:20px;
      line-height:1.8;
    }

    .button{
      display:inline-block;
      margin-top:40px;
      padding:15px 35px;
      background:#00b4d8;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-size:22px;
    }

    .button:hover{
      background:#0096c7;
    }
  </style>
</head>

<body>

<header>
イマミル
</header>

<h2>今、何が起きているかを見つけよう。</h2>

<p>
旅人に寄り添うリアルタイム観光コンシェルジュ
</p>

<a href="#" class="button">
広告を見る
</a>
<p id="location">現在地はまだ取得していません。</p>

<button onclick="getLocation()">
現在地を取得する
</button>

<script>
function getLocation() {

    if (!navigator.geolocation) {
        document.getElementById("location").innerHTML =
        "このブラウザでは位置情報が使えません。";
        return;
    }

    navigator.geolocation.getCurrentPosition(function(position){

        document.getElementById("location").innerHTML =
        "緯度：" + position.coords.latitude +
        "<br>経度：" + position.coords.longitude;

    }, function(){

        document.getElementById("location").innerHTML =
        "位置情報を取得できませんでした。";

    });

}
</script>
</body>
</html>
