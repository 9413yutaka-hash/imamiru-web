<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イマミル</title>

  <style>
    body{
      margin:0;
      font-family: sans-serif;
      background:#f5f7fa;
      color:#333;
    }

    header{
      background:#00b894;
      color:white;
      text-align:center;
      padding:25px;
    }

    header h1{
      margin:0;
      font-size:38px;
    }

    header p{
      margin-top:10px;
      font-size:18px;
    }

    .card{
      background:white;
      margin:20px;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,.1);
    }

    h2{
      color:#00b894;
      margin-top:0;
    }

    button{
      width:100%;
      background:#00b894;
      color:white;
      border:none;
      border-radius:10px;
      padding:15px;
      font-size:18px;
      cursor:pointer;
    }

    footer{
      text-align:center;
      padding:30px;
      color:#777;
    }
  </style>

</head>

<body>

<header>
<h1>イマミル</h1>
<p>あなたに寄り添います。</p>
</header>

<div class="card">
<h2>🌤 今日の旅判断</h2>
<p>Version1ではここに今日の旅判断が表示されます。</p>
</div>

<div class="card">
<h2>✨ 今日だけの情報</h2>
<p>イベント・限定情報・リアルタイム情報を表示します。</p>
</div>

<div class="card">
<h2>💡 AIおすすめ</h2>
<p>AIが今日の旅を提案します。</p>
</div>

<div class="card">
<button>現在地を取得する</button>
</div>

<footer>
イマミル Version1 MVP
</footer>

</body>
</html>
